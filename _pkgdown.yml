url: https://choxos.github.io/rtransparent/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github]

articles:
- title: Articles
  navbar: ~
  contents:
  - rtransparent
  - transparency-summary
  - ai-disclosure

reference:
- title: Package
  contents:
  - rtransparent-package
- title: Run all detectors
  desc: Detect every indicator in one pass.
  contents:
  - rt_all
  - rt_all_pmc
- title: Individual indicators (PMC XML)
  desc: One detector per indicator, for PMC JATS XML files.
  contents:
  - rt_coi_pmc
  - rt_fund_pmc
  - rt_register_pmc
  - rt_novelty_pmc
  - rt_replication_pmc
  - rt_data_code_pmc
  - rt_data_code_pmc_list
  - rt_ai_pmc
- title: Individual indicators (text)
  desc: One detector per indicator, for plain-text (PDF-derived) files.
  contents:
  - rt_coi
  - rt_fund
  - rt_register
  - rt_novelty
  - rt_replication
  - rt_data_code
- title: Metadata and input
  desc: Article metadata and PDF-to-text conversion.
  contents:
  - rt_meta_pmc
  - rt_read_pdf
- title: Summarize and visualize
  desc: Corpus-level prevalence, per-article scores and plots.
  contents:
  - rt_summary
  - rt_score
  - rt_plot
- title: Datasets
  contents:
  - rt_accuracy
  - rt_demo
